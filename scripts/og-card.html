<!DOCTYPE html>
<!--
  Social share card (Open Graph / Twitter) for itay-shechter-portfolio.
  Rendered to public/img/og.jpg at 1200x630 by scripts/render-og.mjs.
  Edit this file, then re-run the render script to regenerate the image.
  Colors and font mirror the site's design tokens (see src/styles/tokens.css).
-->
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0B0B0B; --bg-2:#131313; --ink:#F4F1E9;
    --ink-mute:rgba(244,241,233,0.62); --gold:#C9A86A; --gold-2:#E2C98C;
    --rule:rgba(244,241,233,0.10); --gold-soft:rgba(201,168,106,0.35);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{width:1200px;height:630px}
  body{
    background:
      radial-gradient(900px 500px at 78% 18%, rgba(201,168,106,0.14), transparent 60%),
      linear-gradient(160deg,#0B0B0B 0%,#131313 100%);
    color:var(--ink); font-family:'Heebo',sans-serif;
    display:flex; align-items:center; gap:64px;
    padding:0 88px; overflow:hidden;
  }
  .frame{position:absolute; inset:28px; border:1px solid var(--rule); border-radius:18px; pointer-events:none}
  .frame::before{content:""; position:absolute; inset:-1px; border-radius:18px;
    border:1px solid transparent; border-top-color:var(--gold-soft); border-inline-end-color:var(--gold-soft)}
  .photo-wrap{flex:0 0 auto; position:relative}
  .photo{width:360px; height:360px; border-radius:50%; object-fit:cover;
    border:3px solid var(--gold); box-shadow:0 0 0 10px rgba(201,168,106,0.10), 0 30px 80px rgba(0,0,0,0.55)}
  .text{flex:1 1 auto; min-width:0}
  .eyebrow{display:inline-flex; align-items:center; gap:10px; color:var(--gold);
    font-size:24px; font-weight:500; letter-spacing:.5px; margin-bottom:22px}
  .dot{width:10px; height:10px; border-radius:50%; background:var(--gold); box-shadow:0 0 12px var(--gold)}
  .name{font-size:104px; font-weight:900; line-height:.98; letter-spacing:-1px}
  .role{font-size:46px; font-weight:700; margin-top:14px}
  .role .gold{color:var(--gold)}
  .rule{width:120px; height:3px; background:linear-gradient(90deg,var(--gold),transparent); margin:28px 0; border-radius:2px}
  .tag{font-size:27px; line-height:1.5; color:var(--ink-mute); max-width:620px; font-weight:300}
  .tag b{color:var(--ink); font-weight:600}
  .foot{position:absolute; inset-block-end:54px; inset-inline-start:88px;
    color:var(--ink-mute); font-size:22px; letter-spacing:.3px; direction:ltr}
</style>
</head>
<body>
  <div class="frame"></div>
  <div class="photo-wrap">
    <img class="photo" src="../public/img/hero.jpg" alt="">
  </div>
  <div class="text">
    <div class="eyebrow"><span class="dot"></span>זמין לפרויקטים חדשים</div>
    <div class="name">איתי שכטר</div>
    <div class="role">Social Media <span class="gold">Lead</span></div>
    <div class="rule"></div>
    <div class="tag">עובד בנקודת המפגש שבין <b>חדשות, יצירה וקהל</b>. מרעיון לתוכן שאנשים באמת רוצים לראות.</div>
  </div>
  <div class="foot">barmoshe.github.io/itay-shechter-portfolio</div>
</body>
</html>
